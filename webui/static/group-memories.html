<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Engram WebUI · 群聊记忆</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="badge">Engram</span>
        <div>
          <h1 class="brand-title">群聊记忆</h1>
          <p class="brand-subtitle">归档摘要与检索结果</p>
        </div>
      </div>
      <nav class="topbar-actions">
        <a class="nav-link" href="/static/dashboard.html">主页</a>
        <a class="nav-link" href="/static/memories.html">私聊记忆</a>
        <a class="nav-link active" href="/static/group-memories.html">群聊记忆</a>
        <a class="nav-link" href="/static/profile.html">画像</a>
        <button class="btn btn-primary" id="logout">退出</button>
      </nav>
    </header>

    <main class="content">
      <section class="card">
        <header class="section-header">
          <h3 class="section-title">筛选与检索</h3>
          <span class="section-muted">默认显示全部群聊记忆，可按群组进一步筛选</span>
        </header>
        <div class="filter-grid">
          <div class="autocomplete">
            <input id="group-id" class="form-input" placeholder="群组 ID（可选）" autocomplete="off" />
            <div id="group-suggest" class="suggest-list hidden"></div>
          </div>
          <input id="group-keyword" class="form-input" placeholder="关键词" />
          <input id="group-date" class="form-input" type="date" />
          <button class="btn btn-primary" id="group-search">检索</button>
        </div>
        <p class="form-hint" id="group-hint"></p>
      </section>

      <section class="card">
        <header class="section-header">
          <h3 class="section-title">群聊归档记忆</h3>
          <span class="section-muted">分页浏览</span>
        </header>
        <div class="table-shell">
          <table class="table">
            <thead>
              <tr>
                <th style="width: 40px;"><input type="checkbox" id="check-all" /></th>
                <th>ID</th>
                <th>摘要</th>
                <th>群组</th>
                <th>来源</th>
                <th>时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="group-memory-body"></tbody>
          </table>
        </div>
        <div class="pagination">
          <button class="ghost-btn" id="page-prev">上一页</button>
          <span class="form-hint" id="page-info">第 1 页</span>
          <button class="ghost-btn" id="page-next">下一页</button>
          <select class="form-input" id="page-size">
            <option value="20">20</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
          <div style="flex: 1;"></div>
          <button class="btn btn-primary danger hidden" id="batch-delete"
            style="height: 36px; padding: 0 16px;">批量删除</button>
        </div>
      </section>
    </main>
  </div>

  <script src="/static/auth.js"></script>
  <script src="/static/group-memories.js"></script>
</body>

</html>
