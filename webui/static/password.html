<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Engram WebUI · 修改密码</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="page">
      <main class="login-card" role="main">
        <header class="login-header">
          <span class="badge">安全设置</span>
          <h1>首次登录请修改密码</h1>
          <p>设置新密码后将不再使用系统生成密码。</p>
        </header>

        <form class="login-form" id="password-form">
          <label for="old-password" class="form-label">当前密码</label>
          <input id="old-password" class="form-input" type="password" required />

          <label for="new-password" class="form-label">新密码</label>
          <input id="new-password" class="form-input" type="password" required />

          <button type="submit" class="btn btn-primary">保存并进入</button>
          <p class="form-hint" id="password-hint"></p>
        </form>
      </main>
    </div>

    <script src="/static/auth.js?v=2"></script>
    <script src="/static/password.js"></script>
  </body>
</html>
