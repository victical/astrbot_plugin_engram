<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Engram WebUI · 记忆详情</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="badge">Engram</span>
          <div>
            <h1 class="brand-title">记忆详情</h1>
            <p class="brand-subtitle">原文回放与元信息</p>
          </div>
        </div>
        <nav class="topbar-actions">
          <a class="nav-link" href="/static/dashboard.html">主页</a>
          <a class="nav-link active" href="/static/memories.html">记忆</a>
          <a class="nav-link" href="/static/profile.html">画像</a>
          <button class="btn btn-primary" id="logout">退出</button>
        </nav>
      </header>

      <main class="content">
        <section class="detail-grid">
          <div class="card">
            <header class="section-header">
              <h3 class="section-title">记忆摘要</h3>
            </header>
            <div class="meta-list">
              <div>
                <p class="status-label">记忆 ID</p>
                <p class="status-value" id="detail-id">--</p>
              </div>
              <div>
                <p class="status-label">用户</p>
                <p class="status-value" id="detail-user">--</p>
              </div>
              <div>
                <p class="status-label">来源</p>
                <p class="status-value" id="detail-source">--</p>
              </div>
              <div>
                <p class="status-label">时间</p>
                <p class="status-value" id="detail-time">--</p>
              </div>
            </div>
            <p class="detail-summary" id="detail-summary">--</p>
            <div class="detail-actions">
              <button class="ghost-btn warn" id="detail-delete">删除记忆</button>
              <span class="form-hint" id="detail-action-hint"></span>
            </div>
          </div>

          <div class="card">
            <header class="section-header">
              <h3 class="section-title">原始对话</h3>
            </header>
            <div class="chat-stream" id="detail-stream"></div>
            <p class="form-hint" id="detail-hint"></p>
          </div>
        </section>
      </main>
    </div>

    <script src="/static/auth.js"></script>
    <script src="/static/memory-detail.js"></script>
  </body>
</html>
